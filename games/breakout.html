<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧱 Breakout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      font-family: 'Segoe UI', sans-serif; color: #fff; user-select: none;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    #info { display: flex; gap: 30px; margin-bottom: 12px; font-size: 1rem; }
    #info span { background: #1a1a2e; padding: 5px 16px; border-radius: 8px; }
    canvas { background: #1a1a2e; border: 3px solid #4d96ff; border-radius: 10px; cursor: none; }
    #overlay {
      position: absolute; background: #0f0f1acc; border-radius: 12px;
      padding: 28px 44px; text-align: center; border: 2px solid #4d96ff;
    }
    #overlay h2 { font-size: 1.7rem; color: #ffd93d; margin-bottom: 10px; }
    #overlay p { color: #ccc; margin-bottom: 16px; }
    button { background: #4d96ff; color: #fff; border: none; padding: 10px 28px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2979d8; }
    #back { position: fixed; top: 14px; left: 14px; font-size: 0.9rem; color: #aaa; text-decoration: none; }
    #back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href="../index.html" id="back">← Game Hub</a>
  <h1>🧱 Breakout</h1>
  <div id="info">
    <span>Score: <b id="score">0</b></span>
    <span>Lives: <b id="lives">3</b></span>
    <span>Level: <b id="level">1</b></span>
  </div>
  <div style="position:relative">
    <canvas id="c" width="480" height="420"></canvas>
    <div id="overlay">
      <h2>Breakout 🧱</h2>
      <p>Move your mouse or use ← → arrows<br>to bounce the ball and break all bricks!</p>
      <button onclick="startGame()">Start Game</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const W = canvas.width, H = canvas.height;

    const PAD_W = 80, PAD_H = 12, BALL_R = 7;
    const BRICK_ROWS = 5, BRICK_COLS = 10, BRICK_H = 22, BRICK_GAP = 4;
    const BRICK_TOP = 50;

    const COLORS = ['#ff6b6b','#ff9800','#ffd93d','#6bcb77','#4d96ff','#ba68c8'];

    let paddle, ball, bricks, score, lives, level, running, animId;

    canvas.addEventListener('mousemove', e => {
      if (!running) return;
      const r = canvas.getBoundingClientRect();
      paddle.x = Math.max(0, Math.min(W - PAD_W, e.clientX - r.left - PAD_W / 2));
    });

    document.addEventListener('keydown', e => {
      if (!running) return;
      if (e.key === 'ArrowLeft') paddle.x = Math.max(0, paddle.x - 18);
      if (e.key === 'ArrowRight') paddle.x = Math.min(W - PAD_W, paddle.x + 18);
    });

    function makeBricks(lvl) {
      const bw = (W - (BRICK_COLS + 1) * BRICK_GAP) / BRICK_COLS;
      const res = [];
      for (let r = 0; r < BRICK_ROWS; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const hp = Math.min(3, Math.ceil(lvl / 2)) - (r < 2 ? 0 : 0);
          res.push({
            x: BRICK_GAP + c * (bw + BRICK_GAP),
            y: BRICK_TOP + r * (BRICK_H + BRICK_GAP),
            w: bw, h: BRICK_H,
            hp: Math.min(r < 1 ? 3 : r < 3 ? 2 : 1, lvl),
            maxHp: Math.min(r < 1 ? 3 : r < 3 ? 2 : 1, lvl),
            color: COLORS[r % COLORS.length],
            alive: true
          });
        }
      return res;
    }

    function resetBall() {
      ball = {
        x: W / 2, y: H - 60,
        vx: (Math.random() * 2 - 1) * 3,
        vy: -(4 + level * 0.3),
        r: BALL_R
      };
    }

    function startGame() {
      overlay.style.display = 'none';
      score = 0; lives = 3; level = 1;
      update_ui();
      paddle = { x: W / 2 - PAD_W / 2, y: H - 30, w: PAD_W, h: PAD_H };
      bricks = makeBricks(level);
      resetBall();
      running = true;
      cancelAnimationFrame(animId);
      animId = requestAnimationFrame(loop);
    }

    function update_ui() {
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = lives;
      document.getElementById('level').textContent = level;
    }

    function loop() {
      if (!running) return;
      update(); draw();
      animId = requestAnimationFrame(loop);
    }

    function update() {
      ball.x += ball.vx; ball.y += ball.vy;
      // walls
      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
      if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }

      // paddle
      if (ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h &&
          ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.vy > 0) {
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const speed = Math.hypot(ball.vx, ball.vy);
        const angle = hit * (Math.PI / 3);
        ball.vx = Math.sin(angle) * speed;
        ball.vy = -Math.abs(Math.cos(angle) * speed);
      }

      // bricks
      for (const b of bricks) {
        if (!b.alive) continue;
        if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
          b.hp--;
          if (b.hp <= 0) { b.alive = false; score += 10 * level; update_ui(); }
          const overlapL = (ball.x + ball.r) - b.x;
          const overlapR = (b.x + b.w) - (ball.x - ball.r);
          const overlapT = (ball.y + ball.r) - b.y;
          const overlapB = (b.y + b.h) - (ball.y - ball.r);
          const minH = Math.min(overlapL, overlapR), minV = Math.min(overlapT, overlapB);
          if (minH < minV) ball.vx = overlapL < overlapR ? -Math.abs(ball.vx) : Math.abs(ball.vx);
          else ball.vy = overlapT < overlapB ? -Math.abs(ball.vy) : Math.abs(ball.vy);
          break;
        }
      }

      // fell off
      if (ball.y - ball.r > H) {
        lives--; update_ui();
        if (lives <= 0) { running = false; endGame(false); return; }
        resetBall();
      }

      // all bricks cleared
      if (bricks.every(b => !b.alive)) {
        level++; update_ui();
        bricks = makeBricks(level);
        resetBall();
      }
    }

    function draw() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, W, H);

      // bricks
      bricks.forEach(b => {
        if (!b.alive) return;
        const alpha = 0.4 + 0.6 * (b.hp / b.maxHp);
        ctx.fillStyle = b.color;
        ctx.globalAlpha = alpha;
        ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 4); ctx.fill();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#fff';
        ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 4);
        ctx.globalAlpha = 1;
      });

      // paddle
      const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.w, paddle.y);
      grad.addColorStop(0, '#4d96ff'); grad.addColorStop(1, '#6bcb77');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6); ctx.fill();

      // ball
      const bg = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
      bg.addColorStop(0, '#fff'); bg.addColorStop(1, '#ffd93d');
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
    }

    function endGame(win) {
      overlay.innerHTML = `
        <h2>${win ? '🏆 You Win!' : '💀 Game Over'}</h2>
        <p>Score: <b>${score}</b> &nbsp; Level: <b>${level}</b></p>
        <button onclick="startGame()">Play Again</button>
      `;
      overlay.style.display = '';
    }

    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, W, H);
  </script>
</body>
</html>
