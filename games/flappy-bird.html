<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐦 Flappy Bird</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      font-family: 'Segoe UI', sans-serif; color: #fff; user-select: none;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    canvas { border: 3px solid #4d96ff; border-radius: 10px; cursor: pointer; }
    #back { position: fixed; top: 14px; left: 14px; font-size: 0.9rem; color: #aaa; text-decoration: none; }
    #back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href="../index.html" id="back">← Game Hub</a>
  <h1>🐦 Flappy Bird</h1>
  <canvas id="c" width="360" height="500"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const GRAVITY = 0.45, FLAP = -8.5, PIPE_W = 52, GAP = 145, PIPE_SPEED = 2.5, PIPE_INTERVAL = 90;

    let bird, pipes, score, hiScore = 0, frames, state;
    // state: 'idle' | 'playing' | 'dead'

    function reset() {
      bird = { x: 80, y: H / 2, vy: 0, r: 16 };
      pipes = [];
      score = 0; frames = 0;
      state = 'idle';
    }

    function flap() {
      if (state === 'idle') { state = 'playing'; }
      else if (state === 'dead') { reset(); state = 'playing'; }
      if (state === 'playing') bird.vy = FLAP;
    }

    canvas.addEventListener('click', flap);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });

    function spawnPipe() {
      const top = 60 + Math.random() * (H - GAP - 120);
      pipes.push({ x: W, top, bottom: top + GAP, scored: false });
    }

    function update() {
      if (state !== 'playing') return;
      frames++;
      bird.vy += GRAVITY;
      bird.y += bird.vy;

      if (frames % PIPE_INTERVAL === 0) spawnPipe();

      pipes.forEach(p => {
        p.x -= PIPE_SPEED;
        if (!p.scored && p.x + PIPE_W < bird.x) { p.scored = true; score++; }
      });
      pipes = pipes.filter(p => p.x + PIPE_W > 0);

      // collision
      if (bird.y - bird.r < 0 || bird.y + bird.r > H) { die(); return; }
      for (const p of pipes) {
        if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W) {
          if (bird.y - bird.r < p.top || bird.y + bird.r > p.bottom) { die(); return; }
        }
      }
    }

    function die() {
      state = 'dead';
      if (score > hiScore) hiScore = score;
    }

    function drawPipe(x, h, flip) {
      const capH = 24, capW = PIPE_W + 8;
      ctx.fillStyle = '#4caf50';
      if (!flip) {
        ctx.fillRect(x, 0, PIPE_W, h - capH);
        ctx.fillStyle = '#388e3c';
        ctx.fillRect(x - 4, h - capH, capW, capH);
      } else {
        ctx.fillRect(x, H - h + capH, PIPE_W, h - capH);
        ctx.fillStyle = '#388e3c';
        ctx.fillRect(x - 4, H - h, capW, capH);
      }
    }

    function draw() {
      // sky gradient
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, '#1a2a4a'); sky.addColorStop(1, '#2d5a27');
      ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

      // ground
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(0, H - 20, W, 20);
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(0, H - 24, W, 8);

      // pipes
      pipes.forEach(p => {
        drawPipe(p.x, p.top, false);
        drawPipe(p.x, H - p.bottom, true);
      });

      // bird
      const bx = bird.x, by = bird.y, r = bird.r;
      const tilt = Math.min(Math.max(bird.vy * 3, -25), 70);
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(tilt * Math.PI / 180);
      // body
      ctx.fillStyle = '#ffd93d';
      ctx.beginPath(); ctx.ellipse(0, 0, r, r * 0.85, 0, 0, Math.PI * 2); ctx.fill();
      // wing
      ctx.fillStyle = '#ff9800';
      ctx.beginPath(); ctx.ellipse(-4, 4, 8, 5, -0.3, 0, Math.PI * 2); ctx.fill();
      // eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(7, -4, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(8, -4, 2.5, 0, Math.PI * 2); ctx.fill();
      // beak
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath(); ctx.moveTo(r, 0); ctx.lineTo(r + 10, -3); ctx.lineTo(r + 10, 3); ctx.closePath(); ctx.fill();
      ctx.restore();

      // HUD
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(score, W / 2, 50);

      if (state === 'idle') {
        ctx.fillStyle = '#0f0f1acc';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 30px Segoe UI';
        ctx.fillText('Flappy Bird 🐦', W / 2, H / 2 - 40);
        ctx.font = '18px Segoe UI';
        ctx.fillStyle = '#ccc';
        ctx.fillText('Click, Tap, or Space to flap!', W / 2, H / 2);
        ctx.fillStyle = '#ffd93d';
        ctx.font = '16px Segoe UI';
        ctx.fillText(`Best: ${hiScore}`, W / 2, H / 2 + 34);
      }

      if (state === 'dead') {
        ctx.fillStyle = '#0f0f1acc';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ff6b6b';
        ctx.font = 'bold 36px Segoe UI';
        ctx.fillText('💀 Game Over', W / 2, H / 2 - 50);
        ctx.fillStyle = '#fff';
        ctx.font = '22px Segoe UI';
        ctx.fillText(`Score: ${score}`, W / 2, H / 2);
        ctx.fillStyle = '#ffd93d';
        ctx.fillText(`Best: ${hiScore}`, W / 2, H / 2 + 34);
        ctx.fillStyle = '#aaa';
        ctx.font = '16px Segoe UI';
        ctx.fillText('Click / Tap to play again', W / 2, H / 2 + 70);
      }
    }

    function loop() {
      update(); draw();
      requestAnimationFrame(loop);
    }

    reset();
    loop();
  </script>
</body>
</html>
