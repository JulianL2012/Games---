<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👾 Space Invaders</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      font-family: 'Courier New', monospace; color: #0f0; user-select: none;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; letter-spacing: 4px; }
    #info { display: flex; gap: 30px; margin-bottom: 10px; font-size: 0.95rem; letter-spacing: 2px; }
    canvas { border: 2px solid #0f0; }
    #hint { margin-top: 10px; color: #0a0; font-size: 0.85rem; }
    #back { position: fixed; top: 14px; left: 14px; font-size: 0.9rem; color: #0a0; text-decoration: none; }
    #back:hover { color: #0f0; }
  </style>
</head>
<body>
  <a href="../index.html" id="back">← Hub</a>
  <h1>👾 SPACE INVADERS</h1>
  <div id="info">
    <span>SCORE: <b id="score">0</b></span>
    <span>LIVES: <b id="lives">3</b></span>
    <span>LEVEL: <b id="level">1</b></span>
    <span>HI: <b id="hi">0</b></span>
  </div>
  <canvas id="c" width="540" height="460"></canvas>
  <p id="hint">← → to move &nbsp;|&nbsp; SPACE to shoot &nbsp;|&nbsp; Press SPACE to start</p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const INVADER_TYPES = [
      { emoji: '👾', pts: 30, row: 0 },
      { emoji: '🛸', pts: 20, row: 1 },
      { emoji: '🦑', pts: 10, row: 2 },
    ];
    const COLS = 11, ROWS_INV = 5;
    const I_W = 36, I_H = 30, I_PAD_X = 14, I_PAD_Y = 10;

    let ship, bullets, invaderBullets, invaders, barriers, score, hiScore = 0, lives, level;
    let invDir, invSpeed, invMoveTimer, invDropping, state, animId, bombCD;

    function makeBarriers() {
      const barrs = [];
      [110, 220, 330, 440].forEach(bx => {
        const blocks = [];
        for (let r = 0; r < 3; r++)
          for (let c = 0; c < 5; c++)
            if (!(r === 0 && (c === 0 || c === 4))) // arch shape
              blocks.push({ x: bx + c * 10, y: H - 100 + r * 10, w: 10, h: 10, hp: 3 });
        barrs.push(blocks);
      });
      return barrs;
    }

    function makeInvaders(lvl) {
      const inv = [];
      for (let r = 0; r < ROWS_INV; r++)
        for (let c = 0; c < COLS; c++) {
          const typeIdx = r === 0 ? 0 : r < 3 ? 1 : 2;
          inv.push({ col: c, row: r, x: 60 + c * (I_W + I_PAD_X), y: 50 + r * (I_H + I_PAD_Y), alive: true, type: typeIdx, frame: 0 });
        }
      return inv;
    }

    function startGame() {
      score = 0; lives = 3; level = 1;
      ship = { x: W / 2 - 20, y: H - 40, w: 40, h: 24 };
      bullets = []; invaderBullets = [];
      invaders = makeInvaders(1);
      barriers = makeBarriers();
      invDir = 1; invSpeed = 600; invMoveTimer = 0; invDropping = false;
      state = 'playing'; bombCD = 80;
      updateUI();
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = lives;
      document.getElementById('level').textContent = level;
      document.getElementById('hi').textContent = hiScore;
    }

    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.code === 'Space') { e.preventDefault(); if (state !== 'playing') startGame(); else shoot(); }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    let shootCD = 0;
    function shoot() {
      if (shootCD > 0) return;
      bullets.push({ x: ship.x + ship.w / 2, y: ship.y, vy: -8, r: 4 });
      shootCD = 20;
    }

    let lastTS = 0;
    function loop(ts) {
      const dt = ts - lastTS; lastTS = ts;
      if (state === 'playing') update(dt);
      draw();
      animId = requestAnimationFrame(loop);
    }

    function update(dt) {
      // ship movement
      const sp = 5;
      if ((keys['ArrowLeft'] || keys['a']) && ship.x > 0) ship.x -= sp;
      if ((keys['ArrowRight'] || keys['d']) && ship.x + ship.w < W) ship.x += sp;
      shootCD = Math.max(0, shootCD - 1);

      // bullets
      bullets = bullets.filter(b => b.y > 0);
      bullets.forEach(b => { b.y += b.vy; });

      // invader movement
      invMoveTimer += dt;
      const alive = invaders.filter(i => i.alive);
      if (!alive.length) { nextLevel(); return; }
      const speed = Math.max(100, invSpeed - alive.length * 8);
      if (invMoveTimer >= speed) {
        invMoveTimer = 0;
        const maxX = Math.max(...alive.map(i => i.x + I_W));
        const minX = Math.min(...alive.map(i => i.x));
        if ((invDir === 1 && maxX >= W - 10) || (invDir === -1 && minX <= 10)) {
          invDir *= -1;
          alive.forEach(i => { i.y += I_H / 2; });
        } else {
          alive.forEach(i => { i.x += invDir * (I_W + 4); i.frame = 1 - i.frame; });
        }
      }

      // invader bombs
      bombCD--;
      if (bombCD <= 0) {
        bombCD = Math.max(20, 60 - level * 5);
        const cols = [...new Set(alive.map(i => i.col))];
        const col = cols[Math.floor(Math.random() * cols.length)];
        const shooters = alive.filter(i => i.col === col);
        const lowest = shooters.reduce((a, b) => a.row > b.row ? a : b);
        invaderBullets.push({ x: lowest.x + I_W / 2, y: lowest.y + I_H, vy: 4 + level });
      }
      invaderBullets = invaderBullets.filter(b => b.y < H);
      invaderBullets.forEach(b => { b.y += b.vy; });

      // bullet vs invader
      bullets.forEach(b => {
        invaders.forEach(inv => {
          if (!inv.alive) return;
          if (b.x > inv.x && b.x < inv.x + I_W && b.y > inv.y && b.y < inv.y + I_H) {
            inv.alive = false; b.y = -999;
            score += INVADER_TYPES[inv.type].pts * level;
            if (score > hiScore) hiScore = score;
            updateUI();
          }
        });
      });

      // bullet vs barrier
      [...bullets, ...invaderBullets].forEach(b => {
        barriers.forEach(barr => {
          barr.forEach(block => {
            if (block.hp <= 0) return;
            if (b.x > block.x && b.x < block.x + block.w && b.y > block.y && b.y < block.y + block.h) {
              block.hp--; b.y = -999;
            }
          });
        });
      });

      // invader bullet vs ship
      invaderBullets.forEach(b => {
        if (b.x > ship.x && b.x < ship.x + ship.w && b.y > ship.y && b.y < ship.y + ship.h) {
          b.y = -999; lives--;
          ship.x = W / 2 - 20;
          updateUI();
          if (lives <= 0) { state = 'dead'; }
        }
      });

      // invaders reach ground
      if (alive.some(i => i.y + I_H >= H - 50)) { state = 'dead'; }
    }

    function nextLevel() {
      level++; invSpeed = Math.max(150, 600 - level * 40);
      invaders = makeInvaders(level); barriers = makeBarriers();
      bullets = []; invaderBullets = []; invDir = 1; bombCD = 60;
      updateUI();
    }

    function draw() {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

      // stars
      ctx.fillStyle = '#ffffff22';
      for (let i = 0; i < 60; i++) {
        const sx = (i * 97 + 13) % W, sy = (i * 137 + 41) % H;
        ctx.fillRect(sx, sy, 1, 1);
      }

      // ground line
      ctx.fillStyle = '#0f0';
      ctx.fillRect(0, H - 20, W, 2);

      // barriers
      barriers.forEach(barr => barr.forEach(block => {
        if (block.hp <= 0) return;
        ctx.globalAlpha = block.hp / 3;
        ctx.fillStyle = '#0f0';
        ctx.fillRect(block.x, block.y, block.w, block.h);
        ctx.globalAlpha = 1;
      }));

      // invaders
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      invaders.forEach(inv => {
        if (!inv.alive) return;
        ctx.save();
        if (inv.frame) { ctx.translate(inv.x + I_W / 2, inv.y + I_H / 2); ctx.scale(1, -1); ctx.fillText(INVADER_TYPES[inv.type].emoji, 0, 0); }
        else ctx.fillText(INVADER_TYPES[inv.type].emoji, inv.x + I_W / 2, inv.y + I_H / 2);
        ctx.restore();
      });

      // ship
      ctx.fillStyle = '#0f0';
      ctx.beginPath();
      ctx.moveTo(ship.x + ship.w / 2, ship.y);
      ctx.lineTo(ship.x + ship.w, ship.y + ship.h);
      ctx.lineTo(ship.x, ship.y + ship.h);
      ctx.closePath(); ctx.fill();
      ctx.fillRect(ship.x + ship.w / 2 - 5, ship.y - 8, 10, 10);

      // bullets
      ctx.fillStyle = '#ff0';
      bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); });
      ctx.fillStyle = '#f00';
      invaderBullets.forEach(b => { ctx.fillRect(b.x - 2, b.y - 8, 4, 8); });

      if (state === 'idle' || state === undefined) {
        ctx.fillStyle = '#000a'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#0f0'; ctx.font = 'bold 32px Courier New'; ctx.textAlign = 'center';
        ctx.fillText('SPACE INVADERS', W / 2, H / 2 - 20);
        ctx.font = '18px Courier New'; ctx.fillStyle = '#0a0';
        ctx.fillText('PRESS SPACE TO START', W / 2, H / 2 + 20);
      }
      if (state === 'dead') {
        ctx.fillStyle = '#000a'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#f00'; ctx.font = 'bold 30px Courier New'; ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
        ctx.fillStyle = '#0f0'; ctx.font = '18px Courier New';
        ctx.fillText('SCORE: ' + score + '   HI: ' + hiScore, W / 2, H / 2 + 14);
        ctx.fillStyle = '#0a0'; ctx.font = '14px Courier New';
        ctx.fillText('PRESS SPACE TO PLAY AGAIN', W / 2, H / 2 + 44);
      }
    }

    state = 'idle';
    requestAnimationFrame(loop);
  </script>
</body>
</html>
