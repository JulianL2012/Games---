<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔢 2048</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      font-family: 'Segoe UI', sans-serif; color: #fff; user-select: none;
    }
    h1 { font-size: 2rem; margin-bottom: 6px; }
    #info { display: flex; gap: 20px; margin-bottom: 16px; }
    .stat { background: #1a1a2e; border-radius: 8px; padding: 8px 22px; text-align: center; }
    .stat label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; display: block; }
    .stat b { font-size: 1.4rem; color: #ffd93d; }
    #grid {
      display: grid; grid-template-columns: repeat(4, 90px);
      gap: 10px; background: #1a1a2e; padding: 12px; border-radius: 12px;
      border: 3px solid #4d96ff;
    }
    .cell {
      width: 90px; height: 90px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: bold;
      transition: background 0.1s;
      background: #0f0f1a;
    }
    button { margin-top: 16px; background: #4d96ff; color: #fff; border: none; padding: 10px 30px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2979d8; }
    #back { position: fixed; top: 14px; left: 14px; font-size: 0.9rem; color: #aaa; text-decoration: none; }
    #back:hover { color: #fff; }
    #msg { margin-top: 14px; font-size: 1.3rem; color: #ffd93d; min-height: 28px; text-align: center; }
  </style>
</head>
<body>
  <a href="../index.html" id="back">← Game Hub</a>
  <h1>🔢 2048</h1>
  <div id="info">
    <div class="stat"><label>Score</label><b id="score">0</b></div>
    <div class="stat"><label>Best</label><b id="best">0</b></div>
  </div>
  <div id="grid"></div>
  <div id="msg"></div>
  <button onclick="newGame()">New Game</button>

  <script>
    const COLORS = {
      0:'#0f0f1a', 2:'#eee4da', 4:'#ede0c8', 8:'#f2b179',
      16:'#f59563', 32:'#f67c5f', 64:'#f65e3b',
      128:'#edcf72', 256:'#edcc61', 512:'#edc850',
      1024:'#edc53f', 2048:'#edc22e'
    };
    const TEXT_DARK = [2, 4];
    const SIZE = 4;
    let board, score, best = 0, gameOver;

    function newGame() {
      board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
      score = 0; gameOver = false;
      addTile(); addTile();
      document.getElementById('msg').textContent = '';
      render();
    }

    function addTile() {
      const empties = [];
      board.forEach((row, r) => row.forEach((v, c) => { if (!v) empties.push([r, c]); }));
      if (!empties.length) return;
      const [r, c] = empties[Math.floor(Math.random() * empties.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function slide(row) {
      let arr = row.filter(v => v);
      let gained = 0;
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i] *= 2; gained += arr[i]; arr.splice(i + 1, 1);
        }
      }
      while (arr.length < SIZE) arr.push(0);
      return { row: arr, gained };
    }

    function move(dir) {
      if (gameOver) return;
      let moved = false, gained = 0;
      const clone = board.map(r => [...r]);

      if (dir === 'left') {
        board.forEach((row, r) => {
          const { row: nr, gained: g } = slide(row);
          if (nr.some((v, c) => v !== row[c])) moved = true;
          board[r] = nr; gained += g;
        });
      } else if (dir === 'right') {
        board.forEach((row, r) => {
          const { row: nr, gained: g } = slide([...row].reverse());
          const final = nr.reverse();
          if (final.some((v, c) => v !== row[c])) moved = true;
          board[r] = final; gained += g;
        });
      } else if (dir === 'up') {
        for (let c = 0; c < SIZE; c++) {
          const col = board.map(r => r[c]);
          const { row: nc, gained: g } = slide(col);
          if (nc.some((v, r) => v !== board[r][c])) moved = true;
          nc.forEach((v, r) => { board[r][c] = v; }); gained += g;
        }
      } else if (dir === 'down') {
        for (let c = 0; c < SIZE; c++) {
          const col = board.map(r => r[c]).reverse();
          const { row: nc, gained: g } = slide(col);
          const final = nc.reverse();
          if (final.some((v, r) => v !== board[r][c])) moved = true;
          final.forEach((v, r) => { board[r][c] = v; }); gained += g;
        }
      }

      if (!moved) return;
      score += gained;
      if (score > best) { best = score; document.getElementById('best').textContent = best; }
      document.getElementById('score').textContent = score;
      addTile();
      render();
      checkOver();
    }

    function checkOver() {
      if (board.flat().includes(2048)) {
        document.getElementById('msg').textContent = '🏆 You reached 2048!';
      }
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++) {
          if (!board[r][c]) return;
          if (c < SIZE - 1 && board[r][c] === board[r][c + 1]) return;
          if (r < SIZE - 1 && board[r][c] === board[r + 1][c]) return;
        }
      gameOver = true;
      document.getElementById('msg').textContent = '💀 Game Over!';
    }

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      board.flat().forEach(v => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.background = COLORS[v] || '#3d3a2e';
        cell.style.color = TEXT_DARK.includes(v) ? '#776e65' : '#fff';
        cell.style.fontSize = v > 999 ? '1.1rem' : v > 99 ? '1.4rem' : '1.7rem';
        if (v) cell.textContent = v;
        grid.appendChild(cell);
      });
    }

    document.addEventListener('keydown', e => {
      const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
      if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
    });

    // touch support
    let tx, ty;
    document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
      else move(dy > 0 ? 'down' : 'up');
    });

    newGame();
  </script>
</body>
</html>
