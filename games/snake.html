<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐍 Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      user-select: none;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    #info { display: flex; gap: 30px; margin-bottom: 14px; font-size: 1.1rem; }
    #info span { background: #1a1a2e; padding: 6px 18px; border-radius: 8px; }
    canvas {
      background: #1a1a2e;
      border: 3px solid #4d96ff;
      border-radius: 10px;
    }
    #overlay {
      position: absolute;
      background: #0f0f1acc;
      border-radius: 12px;
      padding: 30px 50px;
      text-align: center;
      border: 2px solid #4d96ff;
    }
    #overlay h2 { font-size: 1.8rem; margin-bottom: 10px; color: #ffd93d; }
    #overlay p { color: #ccc; margin-bottom: 18px; }
    button {
      background: #4d96ff;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2979d8; }
    #back { position: fixed; top: 14px; left: 14px; font-size: 0.9rem; color: #aaa; text-decoration: none; }
    #back:hover { color: #fff; }
  </style>
</head>
<body>
  <a href="../index.html" id="back">← Game Hub</a>
  <h1>🐍 Snake</h1>
  <div id="info">
    <span>Score: <b id="score">0</b></span>
    <span>High Score: <b id="hi">0</b></span>
    <span>Level: <b id="level">1</b></span>
  </div>
  <div style="position:relative">
    <canvas id="c" width="400" height="400"></canvas>
    <div id="overlay">
      <h2>Snake 🐍</h2>
      <p>Use arrow keys or WASD to move.<br>Eat food to grow and score points!</p>
      <button onclick="startGame()">Start Game</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const scoreEl = document.getElementById('score');
    const hiEl = document.getElementById('hi');
    const levelEl = document.getElementById('level');

    const CELL = 20;
    const COLS = canvas.width / CELL;
    const ROWS = canvas.height / CELL;

    let snake, dir, nextDir, food, score, hiScore = 0, level, loop;

    function rnd(max) { return Math.floor(Math.random() * max); }

    function placeFood() {
      let pos;
      do { pos = { x: rnd(COLS), y: rnd(ROWS) }; }
      while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function startGame() {
      overlay.style.display = 'none';
      snake = [{ x: 10, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0; level = 1;
      scoreEl.textContent = 0; levelEl.textContent = 1;
      placeFood();
      clearInterval(loop);
      loop = setInterval(tick, 150);
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // wall wrap
      head.x = (head.x + COLS) % COLS;
      head.y = (head.y + ROWS) % ROWS;

      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        clearInterval(loop);
        gameOver();
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        scoreEl.textContent = score;
        if (score > hiScore) { hiScore = score; hiEl.textContent = hiScore; }
        level = Math.floor(score / 100) + 1;
        levelEl.textContent = level;
        clearInterval(loop);
        loop = setInterval(tick, Math.max(60, 150 - (level - 1) * 10));
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // grid
      ctx.strokeStyle = '#ffffff08';
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // food
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // snake
      snake.forEach((seg, i) => {
        const ratio = i / snake.length;
        ctx.fillStyle = `hsl(${120 - ratio * 40}, 70%, ${50 - ratio * 15}%)`;
        const pad = i === 0 ? 1 : 2;
        const r = i === 0 ? 6 : 4;
        roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, r);
        ctx.fill();
      });

      // eyes on head
      const head = snake[0];
      ctx.fillStyle = '#fff';
      const ex = head.x * CELL + CELL / 2 + dir.x * 4;
      const ey = head.y * CELL + CELL / 2 + dir.y * 4;
      ctx.beginPath(); ctx.arc(ex + dir.y * 4, ey - dir.x * 4, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex - dir.y * 4, ey + dir.x * 4, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(ex + dir.y * 4, ey - dir.x * 4, 1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex - dir.y * 4, ey + dir.x * 4, 1, 0, Math.PI * 2); ctx.fill();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    function gameOver() {
      overlay.innerHTML = `
        <h2>Game Over 💀</h2>
        <p>Score: <b>${score}</b> &nbsp; High Score: <b>${hiScore}</b></p>
        <button onclick="startGame()">Play Again</button>
      `;
      overlay.style.display = '';
    }

    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 },
      };
      const nd = map[e.key];
      if (nd && !(nd.x === -dir.x && nd.y === -dir.y)) {
        e.preventDefault();
        nextDir = nd;
      }
    });

    // Draw initial board
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
