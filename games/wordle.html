<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🟩 Wordle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a; display: flex; flex-direction: column;
      align-items: center; min-height: 100vh; padding: 20px 0 60px;
      font-family: 'Segoe UI', sans-serif; color: #fff;
    }
    h1 { font-size: 2rem; margin-bottom: 4px; }
    #sub { color: #888; font-size: 0.9rem; margin-bottom: 16px; }
    #board { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .row { display: flex; gap: 6px; }
    .tile {
      width: 56px; height: 56px; border: 2px solid #3d3d5e;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: bold; text-transform: uppercase;
      transition: background 0.3s, border-color 0.3s;
    }
    .tile.filled { border-color: #888; }
    .tile.correct { background: #538d4e; border-color: #538d4e; }
    .tile.present { background: #b59f3b; border-color: #b59f3b; }
    .tile.absent  { background: #3a3a3a; border-color: #3a3a3a; }
    .tile.reveal  { animation: flip 0.5s ease; }
    @keyframes flip { 0%{transform:scaleY(1)} 50%{transform:scaleY(0)} 100%{transform:scaleY(1)} }
    .tile.shake { animation: shake 0.4s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    #keyboard { display: flex; flex-direction: column; gap: 6px; }
    .krow { display: flex; gap: 5px; justify-content: center; }
    .key {
      padding: 14px 10px; border-radius: 6px; background: #3d3d5e;
      font-size: 0.85rem; font-weight: bold; cursor: pointer; border: none;
      color: #fff; min-width: 36px; text-align: center;
      transition: background 0.2s;
    }
    .key.wide { min-width: 54px; font-size: 0.75rem; }
    .key.correct { background: #538d4e; }
    .key.present { background: #b59f3b; }
    .key.absent  { background: #3a3a3a; }
    #msg { height: 30px; font-size: 1.1rem; color: #ffd93d; text-align: center; margin-bottom: 8px; }
    #back { position: fixed; top: 14px; left: 14px; font-size: 0.9rem; color: #aaa; text-decoration: none; }
    #back:hover { color: #fff; }
    button.new { margin-top: 10px; background: #4d96ff; color: #fff; border: none; padding: 9px 26px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button.new:hover { background: #2979d8; }
  </style>
</head>
<body>
  <a href="../index.html" id="back">← Game Hub</a>

      'zilch','zonal','zones','zoned',
    ].filter(w => w.length === 5);

    let target, current, guesses, over;

    function newGame() {
      target = WORDS[Math.floor(Math.random() * WORDS.length)].toUpperCase();
      current = ''; guesses = []; over = false;
      document.getElementById('msg').textContent = '';
      buildBoard(); buildKeyboard();
    }

    function buildBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      for (let r = 0; r < 6; r++) {
        const row = document.createElement('div');
        row.className = 'row';
        for (let c = 0; c < 5; c++) {
          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.id = `t${r}${c}`;
          row.appendChild(tile);
        }
        board.appendChild(row);
      }
    }

    const KEYBOARD_ROWS = [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['Enter','Z','X','C','V','B','N','M','⌫'],
    ];
    const keyStates = {};

    function buildKeyboard() {
      for (const k in keyStates) delete keyStates[k];
      const kbd = document.getElementById('keyboard');
      kbd.innerHTML = '';
      KEYBOARD_ROWS.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'krow';
        row.forEach(key => {
          const btn = document.createElement('button');
          btn.className = 'key' + (key.length > 1 ? ' wide' : '');
          btn.textContent = key;
          btn.id = 'k' + key;
          btn.addEventListener('click', () => handleKey(key));
          rowEl.appendChild(btn);
        });
        kbd.appendChild(rowEl);
      });
    }

    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (e.key === 'Enter') handleKey('Enter');
      else if (e.key === 'Backspace') handleKey('⌫');
      else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
    });

    function handleKey(key) {
      if (over) return;
      if (key === '⌫') {
        current = current.slice(0, -1);
      } else if (key === 'Enter') {
        submit();
        return;
      } else if (current.length < 5) {
        current += key;
      }
      updateCurrentRow();
    }

    function updateCurrentRow() {
      const r = guesses.length;
      for (let c = 0; c < 5; c++) {
        const tile = document.getElementById(`t${r}${c}`);
        tile.textContent = current[c] || '';
        tile.className = 'tile' + (current[c] ? ' filled' : '');
      }
    }

    function submit() {
      if (current.length < 5) { flash(); return; }
      if (!WORDS.includes(current.toLowerCase())) {
        document.getElementById('msg').textContent = 'Not in word list!';
        flash();
        return;
      }
      document.getElementById('msg').textContent = '';
      const r = guesses.length;
      const result = score(current);
      guesses.push({ word: current, result });

      // reveal with delay
      result.forEach((state, c) => {
        setTimeout(() => {
          const tile = document.getElementById(`t${r}${c}`);
          tile.classList.add('reveal');
          tile.className = `tile reveal ${state}`;
          // update keyboard
          const cur = keyStates[current[c]];
          if (!cur || cur === 'absent' || (cur === 'present' && state === 'correct')) {
            keyStates[current[c]] = state;
            const kBtn = document.getElementById('k' + current[c]);
            if (kBtn) { kBtn.className = `key ${state}`; }
          }
        }, c * 100);
      });

      setTimeout(() => {
        if (current === target) {
          const msgs = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
          document.getElementById('msg').textContent = msgs[Math.min(r, 5)] + ' 🎉';
          over = true;
        } else if (guesses.length === 6) {
          document.getElementById('msg').textContent = `Answer: ${target}`;
          over = true;
        }
        current = '';
      }, 600);
    }

    function score(word) {
      const result = Array(5).fill('absent');
      const remaining = target.split('');
      // correct pass
      for (let i = 0; i < 5; i++) {
        if (word[i] === target[i]) { result[i] = 'correct'; remaining[i] = null; }
      }
      // present pass
      for (let i = 0; i < 5; i++) {
        if (result[i] === 'correct') continue;
        const idx = remaining.indexOf(word[i]);
        if (idx !== -1) { result[i] = 'present'; remaining[idx] = null; }
      }
      return result;
    }

    function flash() {
      const r = guesses.length;
      for (let c = 0; c < 5; c++) {
        const tile = document.getElementById(`t${r}${c}`);
        tile.classList.add('shake');
        setTimeout(() => tile.classList.remove('shake'), 400);
      }
    }

    newGame();
  </script>
